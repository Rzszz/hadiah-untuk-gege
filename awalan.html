<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Untuk Teman Cantik</title>

    <!-- Typed.js dari CDN -->
    <script src="https://cdn.jsdelivr.net/npm/typed.js@2.0.9"></script>

    <style>
      /* ─── Reset & Dasar ─── */
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        min-height: 100vh;
        overflow: hidden;
        font-family: "Segoe UI", "Poppins", system-ui, -apple-system, sans-serif;
        background: linear-gradient(
          145deg,
          #fce4ec 0%,
          #f3e5f5 40%,
          #e8eaf6 70%,
          #e0f7fa 100%
        );
        user-select: none;
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
      }

      /* ─── Container ─── */
      #app {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* ─── Latar Belakang ─── */
      #bg-layer {
        position: absolute;
        inset: 0;
        background: radial-gradient(
            circle at 20% 30%,
            rgba(255, 182, 193, 0.25) 0%,
            transparent 60%
          ),
          radial-gradient(
            circle at 80% 70%,
            rgba(206, 147, 216, 0.2) 0%,
            transparent 55%
          ),
          radial-gradient(
            circle at 40% 80%,
            rgba(179, 229, 252, 0.18) 0%,
            transparent 50%
          );
        pointer-events: none;
        z-index: 0;
      }

      /* ─── Tempat Gelembung ─── */
      #bubble-container {
        position: absolute;
        inset: 0;
        z-index: 1;
        pointer-events: none;
      }

      /* ─── Gelembung ─── */
      .bubble {
        position: absolute;
        border-radius: 50%;
        cursor: pointer;
        pointer-events: auto;
        will-change: transform, opacity;
        transition: transform 0.15s ease-out;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: inset 0 -8px 20px rgba(255, 255, 255, 0.5),
          0 4px 20px rgba(0, 0, 0, 0.06),
          inset 0 4px 12px rgba(255, 255, 255, 0.8);
        background: radial-gradient(
          circle at 30% 25%,
          rgba(255, 255, 255, 0.85) 0%,
          rgba(255, 255, 255, 0.15) 70%,
          rgba(255, 255, 255, 0.3) 100%
        );
        backdrop-filter: blur(1px);
        border: 1px solid rgba(255, 255, 255, 0.35);
      }

      .bubble::after {
        content: "";
        position: absolute;
        top: 12%;
        left: 22%;
        width: 28%;
        height: 20%;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(255, 255, 255, 0.75) 0%,
          transparent 80%
        );
        opacity: 0.7;
        pointer-events: none;
      }

      .bubble:active {
        transform: scale(0.92);
      }

      /* ─── Animasi gelembung naik ─── */
      @keyframes float-up {
        0% {
          transform: translateY(0) scale(0.6);
          opacity: 0;
        }
        8% {
          opacity: 0.9;
          transform: translateY(0) scale(1);
        }
        92% {
          opacity: 0.8;
        }
        100% {
          transform: translateY(calc(-110vh - 100px)) scale(0.9);
          opacity: 0;
        }
      }

      .bubble.animating {
        animation: float-up var(--duration, 12s) cubic-bezier(0.2, 0.8, 0.3, 1)
          forwards;
      }

      /* ─── Teks Utama dengan efek typing ─── */
      #text-container {
        position: relative;
        z-index: 10;
        text-align: center;
        padding: 20px;
        pointer-events: none;
        transition: transform 0.5s ease;
      }

      #main-text {
        font-size: clamp(1.25rem, 2.5vw, 1.9rem);
        font-weight: 700;
        line-height: 1.3;
        letter-spacing: -0.02em;
        background: linear-gradient(135deg, #e91e63, #9c27b0, #3f51b5, #00bcd4);
        background-size: 300% 300%;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        animation: gradShift 8s ease-in-out infinite alternate;
        text-shadow: 0 0 80px rgba(233, 30, 99, 0.15),
          0 0 120px rgba(156, 39, 176, 0.1);
        filter: drop-shadow(0 4px 20px rgba(0, 0, 0, 0.06));
        pointer-events: none;
        display: inline-block;
        transition: font-size 0.6s ease, background 0.6s ease;
      }

      #main-text .typing {
        -webkit-text-fill-color: initial;
        background: none;
        display: inline-block;
      }

      @keyframes gradShift {
        0% {
          background-position: 0% 0%;
        }
        100% {
          background-position: 100% 100%;
        }
      }

      /* ─── Hati Besar di Tengah ─── */
      #big-heart {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) scale(0);
        z-index: 5;
        pointer-events: none;
        font-size: clamp(20rem, 60vw, 50rem);
        opacity: 0;
        transition: opacity 1s ease,
          transform 1s cubic-bezier(0.34, 1.56, 0.64, 1);
        color: rgba(233, 30, 99, 0.25);
        text-shadow: 0 0 80px rgba(233, 30, 99, 0.3),
          0 0 160px rgba(156, 39, 176, 0.2);
        line-height: 1;
      }

      #big-heart.show {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }

      /* ─── Efek Hati (love burst) ─── */
      .heart-particle {
        position: fixed;
        pointer-events: none;
        z-index: 999;
        font-size: clamp(1.2rem, 3vw, 2.4rem);
        will-change: transform, opacity;
        animation: heartFly var(--fly-duration, 1.2s)
          cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
      }

      @keyframes heartFly {
        0% {
          opacity: 1;
          transform: translate(0, 0) scale(1) rotate(0deg);
        }
        100% {
          opacity: 0;
          transform: translate(var(--tx, 80px), var(--ty, -120px)) scale(0.2)
            rotate(var(--rot, 360deg));
        }
      }

      /* ─── Efek pecah gelembung ─── */
      .bubble.burst {
        animation: burstPop 0.3s ease-out forwards !important;
      }

      @keyframes burstPop {
        0% {
          transform: scale(1);
          opacity: 1;
        }
        50% {
          transform: scale(1.25);
          opacity: 0.8;
        }
        100% {
          transform: scale(0);
          opacity: 0;
        }
      }

      /* ─── Responsif ─── */
      @media (max-width: 480px) {
        .heart-particle {
          font-size: clamp(1rem, 4vw, 1.6rem);
        }
        .bubble {
          border-width: 0.5px;
        }
        #big-heart {
          font-size: clamp(15rem, 70vw, 30rem);
        }
      }

      @media (max-width: 360px) {
        #main-text {
          font-size: clamp(1.15rem, 2.5vw, 1.4rem);
        }
        #big-heart {
          font-size: clamp(12rem, 60vw, 25rem);
        }
      }

      /* ─── Pesan interaksi ─── */
      #hint {
        position: fixed;
        bottom: 28px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 20;
        color: rgba(233, 30, 99, 0.5);
        font-size: clamp(0.7rem, 1.8vw, 0.95rem);
        font-weight: 500;
        letter-spacing: 0.04em;
        pointer-events: none;
        background: rgba(255, 255, 255, 0.4);
        backdrop-filter: blur(8px);
        padding: 8px 20px;
        border-radius: 40px;
        border: 1px solid rgba(255, 255, 255, 0.5);
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
        white-space: nowrap;
        animation: hintPulse 3s ease-in-out infinite;
      }

      @keyframes hintPulse {
        0%,
        100% {
          opacity: 0.5;
          transform: translateX(-50%) scale(1);
        }
        50% {
          opacity: 0.9;
          transform: translateX(-50%) scale(1.02);
        }
      }

      @media (max-width: 480px) {
        #hint {
          bottom: 16px;
          padding: 5px 14px;
          font-size: 0.6rem;
          white-space: nowrap;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="bg-layer"></div>
      <div id="bubble-container"></div>
      <div id="big-heart">❤️</div>
      <div id="text-container">
        <h1 id="main-text">
          Halo kak Nisa.. Kakak Setiap Hari Selalu <span class="typing"></span>
        </h1>
      </div>
      <div id="hint">✨ sentuh gelembungnya ✨</div>
    </div>

    <script>
      (function () {
        "use strict";

        const container = document.getElementById("bubble-container");
        const hint = document.getElementById("hint");
        const mainText = document.getElementById("main-text");
        const bigHeart = document.getElementById("big-heart");

        // ─── Konfigurasi ───
        const CONFIG = {
          maxBubbles: 15,
          spawnInterval: 333, // ~3 per detik
          minSize: 28,
          maxSize: 80,
          minDuration: 9,
          maxDuration: 18,
          heartCount: 8,
          heartEmojis: ["❤️", "💕", "💗", "💖", "♥️"],
          targetClicks: 5,
        };

        let bubbles = [];
        let spawnTimer = null;
        let bubblePopCount = 0;
        let hasCelebrated = false;
        let typedInstance = null;

        function random(min, max) {
          return Math.random() * (max - min) + min;
        }
        function randomInt(min, max) {
          return Math.floor(random(min, max + 1));
        }
        function pick(arr) {
          return arr[Math.floor(Math.random() * arr.length)];
        }

        function createBubble() {
          if (bubbles.length >= CONFIG.maxBubbles) return null;

          const size = random(CONFIG.minSize, CONFIG.maxSize);
          const duration = random(CONFIG.minDuration, CONFIG.maxDuration);
          const x = random(0, 100);
          const yStart = random(100, 130);

          const hue = random(320, 380) % 360;
          const sat = random(30, 65);
          const lig = random(70, 92);
          const alpha = random(0.15, 0.35);
          const color = `hsla(${hue}, ${sat}%, ${lig}%, ${alpha})`;

          const el = document.createElement("div");
          el.className = "bubble animating";
          el.style.width = size + "px";
          el.style.height = size + "px";
          el.style.left = x + "%";
          el.style.top = yStart + "%";
          el.style.setProperty("--duration", duration + "s");
          el.style.background = `radial-gradient(circle at 30% 25%, rgba(255,255,255,0.85) 0%, ${color} 70%, rgba(255,255,255,0.20) 100%)`;
          el.style.boxShadow = `inset 0 -8px 20px rgba(255,255,255,0.5), 0 4px 20px rgba(0,0,0,0.05), inset 0 4px 12px rgba(255,255,255,0.7)`;
          el.style.borderColor = `rgba(255,255,255,${random(0.2, 0.5)})`;

          const data = { el, size, duration, x, yStart, alive: true };

          const handler = function (e) {
            e.stopPropagation();
            if (!data.alive) return;
            popBubble(data);
          };

          el.addEventListener("click", handler);
          el.addEventListener(
            "touchstart",
            function (e) {
              e.preventDefault();
              e.stopPropagation();
              if (!data.alive) return;
              popBubble(data);
            },
            { passive: false }
          );

          container.appendChild(el);
          bubbles.push(data);

          el.addEventListener("animationend", function () {
            if (data.alive) removeBubble(data);
          });

          const timeoutId = setTimeout(() => {
            if (data.alive) removeBubble(data);
          }, duration * 1000 + 500);

          data._timeoutId = timeoutId;
          return data;
        }

        function removeBubble(data) {
          if (!data.alive) return;
          data.alive = false;
          if (data._timeoutId) {
            clearTimeout(data._timeoutId);
            data._timeoutId = null;
          }
          if (data.el && data.el.parentNode) data.el.remove();
          const idx = bubbles.indexOf(data);
          if (idx !== -1) bubbles.splice(idx, 1);
        }

        function celebrate() {
          if (hasCelebrated) return;
          hasCelebrated = true;

          // ─── HENTIKAN SPAWNING GELEMBUNG ───
          stopSpawning();

          // Hentikan Typed
          if (typedInstance) {
            typedInstance.destroy();
            typedInstance = null;
          }

          // Ubah teks
          mainText.innerHTML = "Lope Youu manisss ❤️";
          mainText.style.fontSize = "clamp(2.8rem, 6vw, 4.8rem)";
          bigHeart.classList.add("show");

          // Sembunyikan hint
          if (hint) {
            hint.style.transition = "opacity 0.8s ease";
            hint.style.opacity = "0";
            setTimeout(() => {
              if (hint) hint.style.display = "none";
            }, 900);
          }
        }

        function popBubble(data) {
          if (!data.alive) return;
          data.alive = false;

          if (data._timeoutId) {
            clearTimeout(data._timeoutId);
            data._timeoutId = null;
          }

          const el = data.el;
          const rect = el.getBoundingClientRect();
          const cx = rect.left + rect.width / 2;
          const cy = rect.top + rect.height / 2;

          el.classList.remove("animating");
          el.classList.add("burst");

          const idx = bubbles.indexOf(data);
          if (idx !== -1) bubbles.splice(idx, 1);

          setTimeout(() => {
            if (el.parentNode) el.remove();
          }, 350);

          spawnHearts(cx, cy, data.size);

          if (!hasCelebrated) {
            bubblePopCount++;
            if (bubblePopCount >= CONFIG.targetClicks) {
              celebrate();
            }
          }

          if (hint && hint.style.display !== "none") {
            hint.style.transition = "opacity 0.8s ease";
            hint.style.opacity = "0";
            setTimeout(() => {
              if (hint) hint.style.display = "none";
            }, 900);
          }
        }

        function spawnHearts(cx, cy, bubbleSize) {
          const count = randomInt(6, CONFIG.heartCount + 2);
          const emojis = CONFIG.heartEmojis;
          const scaleBase = Math.min(1.4, bubbleSize / 40);

          for (let i = 0; i < count; i++) {
            const el = document.createElement("div");
            el.className = "heart-particle";
            el.textContent = pick(emojis);

            const angle = random(0, Math.PI * 2);
            const distance = random(50, 140) * scaleBase;
            const tx = Math.cos(angle) * distance * random(0.6, 1.3);
            const ty =
              Math.sin(angle) * distance * random(0.6, 1.3) - random(20, 50);
            const rot = random(-360, 360);
            const dur = random(0.6, 1.4);

            el.style.left = cx + "px";
            el.style.top = cy + "px";
            el.style.transform = "translate(-50%, -50%) scale(0.4)";
            el.style.fontSize =
              clamp(random(0.8, 2.0) * scaleBase, 0.7, 2.8) + "rem";

            el.style.setProperty("--tx", tx + "px");
            el.style.setProperty("--ty", ty + "px");
            el.style.setProperty("--rot", rot + "deg");
            el.style.setProperty("--fly-duration", dur + "s");

            document.body.appendChild(el);

            setTimeout(() => {
              if (el.parentNode) el.remove();
            }, dur * 1000 + 100);
          }
        }

        function clamp(val, min, max) {
          return Math.max(min, Math.min(max, val));
        }

        function startSpawning() {
          if (spawnTimer) return;
          for (let i = 0; i < 3; i++) {
            setTimeout(() => createBubble(), i * 400);
          }
          spawnTimer = setInterval(() => {
            if (bubbles.length < CONFIG.maxBubbles) {
              createBubble();
            }
          }, CONFIG.spawnInterval);
        }

        function stopSpawning() {
          if (spawnTimer) {
            clearInterval(spawnTimer);
            spawnTimer = null;
          }
        }

        function clearAllBubbles() {
          stopSpawning();
          for (const data of [...bubbles]) {
            if (data.alive) removeBubble(data);
          }
          bubbles = [];
          while (container.firstChild)
            container.removeChild(container.firstChild);
        }

        function handleVisibility() {
          if (document.hidden) stopSpawning();
          else startSpawning();
        }

        function initTyped() {
          const options = {
            strings: [
              "cantik.. 😊",
              "menawan.. ❤️",
              "Imupp.. 😣😣",
              "luar biasa.. 💖",
              "istimewa.. 🌸",
              "Bocilll.. 😘",
            ],
            typeSpeed: 50,
            backSpeed: 25,
            backDelay: 1200,
            startDelay: 300,
            loop: true,
            showCursor: true,
            cursorChar: "|",
            contentType: "html",
          };

          const typingElement = document.querySelector(".typing");
          if (typingElement) {
            typedInstance = new Typed(".typing", options);
          }
        }

        function init() {
          clearAllBubbles();
          startSpawning();
          document.addEventListener("visibilitychange", handleVisibility);

          if (
            document.readyState === "complete" ||
            document.readyState === "interactive"
          ) {
            initTyped();
          } else {
            document.addEventListener("DOMContentLoaded", initTyped);
          }
        }

        init();

        window.__bubbleApp = {
          createBubble,
          popBubble,
          clearAllBubbles,
          bubbles: () => bubbles,
          config: CONFIG,
          celebrate,
        };
      })();
    </script>
  </body>
</html>
